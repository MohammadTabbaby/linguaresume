resume_css: |
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  @page { margin: 18mm 20mm 18mm 20mm; size: A4; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-size: 10.5pt; line-height: 1.55; color: #1a1a1a; background: #ffffff; }
  h1 { font-size: 24pt; font-weight: 700; letter-spacing: -0.3px; color: #0f172a; margin-bottom: 3px; }
  h1 + p strong { font-size: 12.5pt; font-weight: 600; color: #334155; }
  h1 ~ p { font-size: 9pt; color: #475569; margin-top: 2px; margin-bottom: 1px; }
  hr { border: none; border-top: 2.5px solid #0f172a; margin: 10px 0 12px 0; }
  h2 { font-size: 9.5pt; font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; color: #0f172a; border-bottom: 1.5px solid #cbd5e1; padding-bottom: 4px; margin-top: 18px; margin-bottom: 10px; page-break-after: avoid; break-after: avoid; }
  h3 { font-size: 10pt; font-weight: 600; color: #1e293b; margin-top: 12px; margin-bottom: 5px; page-break-after: avoid; break-after: avoid; }
  ul { padding-left: 16px; margin-bottom: 4px; page-break-inside: avoid; break-inside: avoid; }
  li { list-style-type: disc; margin-bottom: 3px; line-height: 1.5; color: #1e293b; }
  li strong { color: #0f172a; }
  table { width: 100%; border-collapse: collapse; font-size: 9.5pt; margin-top: 4px; margin-bottom: 6px; page-break-inside: avoid; break-inside: avoid; }
  thead th { background-color: #0f172a; color: #f8fafc; font-weight: 600; padding: 6px 12px; text-align: left; }
  tbody td { padding: 5px 12px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
  tbody td:first-child { font-weight: 600; color: #0f172a; white-space: nowrap; width: 30%; }
  tbody tr:nth-child(even) td { background-color: #f8fafc; }
  a { color: #2563eb; text-decoration: none; }
  p { margin-bottom: 4px; }
  strong { font-weight: 700; }